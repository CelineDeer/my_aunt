<style>

            background-color: #FFF5F5;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fecaca' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");

            cursor: pointer;

        .option-card.active {
            background-color: #FECACA; /* rose-200 */
            border-color: #FB7185; /* rose-400 */

        }
        .option-card.active span {
            color: #E11D48; /* rose-600 */

        }

            display: none;
        }

            -ms-overflow-style: none;

        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;

<script>
        function toggleActive(element) {
            // Find parent group (section or div container) to allow single/multi selection logic
            // For simplicity in this UI demo, we'll just toggle the clicked one
            element.classList.toggle('active');
            
            // If it's single selection (like Volume or Color), we should remove others
            const section = element.closest('section');
            const isSingleSelection = section.querySelector('h3').innerText.includes('量') || 
                                     section.querySelector('h3').innerText.includes('颜色') ||
                                     section.querySelector('h3').innerText.includes('质地');
            
            if (isSingleSelection && element.classList.contains('active')) {
                const siblings = section.querySelectorAll('.option-card');
                siblings.forEach(sib => {
                    if (sib !== element) sib.classList.remove('active');
                });
            }
        }
    </script>
